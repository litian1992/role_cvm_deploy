---
- name: Ensure that the role runs with default parameters
  hosts: all
  gather_facts: true
  roles:
    - linux-system-roles.trustee_server
  tasks:
    - name: Gather package facts
      ansible.builtin.package_facts:
        manager: auto

    - name: Assert required packages are installed
      ansible.builtin.assert:
        that: item in ansible_facts.packages
        fail_msg: "Required package {{ item }} is not installed"
      loop: "{{ __trustee_server_trustee_packages }}"

    - name: Check trustee quadlet install directory exists
      ansible.builtin.stat:
        path: "{{ trustee_server_quadlet_install_dir }}"
      register: quadlet_dir

    - name: Assert quadlet directory exists
      ansible.builtin.assert:
        that: quadlet_dir.stat.exists
        fail_msg: "Quadlet install directory {{ trustee_server_quadlet_install_dir }} was not created"

    - name: Find quadlet files in install directory
      ansible.builtin.find:
        paths: "{{ trustee_server_quadlet_install_dir }}"
        patterns:
          - "*.container"
          - "*.volume"
          - "*.network"
          - "*.pod"
        recurse: false
      register: quadlet_files

    - name: Assert quadlet files exist
      ansible.builtin.assert:
        that: quadlet_files.matched | int > 0
        fail_msg: "No quadlet files found in {{ trustee_server_quadlet_install_dir }}"

    - name: Find trustee pod file
      ansible.builtin.find:
        paths: "{{ trustee_server_quadlet_install_dir }}"
        patterns: "*.pod"
        recurse: false
      register: trustee_pod_files

    - name: Check trustee pod service is running
      ansible.builtin.command:
        cmd: systemctl is-active "{{ (trustee_pod_files.files[0].path | basename) | replace('.pod', '') }}-pod.service"
      register: trustee_pod_status
      changed_when: false

    - name: Assert trustee pod is active
      ansible.builtin.assert:
        that: trustee_pod_status.stdout == 'active'
        fail_msg: "Trustee pod service is not running"

    - name: Check trustee certificates and keys were generated
      ansible.builtin.stat:
        path: "{{ item }}"
      register: trustee_certs
      loop:
        - /etc/trustee/kbs/server.key
        - /etc/trustee/kbs/server.crt
        - /etc/trustee/kbs/auth.key
        - /etc/trustee/kbs/auth.pub
        - /etc/trustee/as/token.key
        - /etc/trustee/as/token.crt
        - /etc/trustee/kbs/trusted_certs/token0.crt

    - name: Assert trustee certificates and keys exist
      ansible.builtin.assert:
        that: item.stat.exists
        fail_msg: "Trustee cert/key {{ item.item }} was not generated"
      loop: "{{ trustee_certs.results }}"
