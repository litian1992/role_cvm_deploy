---
- name: Ensure secret registration server is deployed when enabled
  hosts: all
  gather_facts: true
  vars:
    trustee_server_trustee: true
    trustee_server_secret_registration_server_enabled: true
  roles:
    - linux-system-roles.trustee_server
  tasks:
    - name: Gather package facts
      ansible.builtin.package_facts:
        manager: auto

    - name: Assert required packages are installed
      ansible.builtin.assert:
        that: item in ansible_facts.packages
        fail_msg: "Required package {{ item }} is not installed"
      loop: "{{ __trustee_server_trustee_packages + __trustee_server_secret_registration_packages }}"

    - name: Check secret registration server script exists
      ansible.builtin.stat:
        path: /usr/local/bin/secret_registration_server.py
      register: server_script

    - name: Assert secret registration server script was deployed
      ansible.builtin.assert:
        that: server_script.stat.exists
        fail_msg: "Secret registration server script was not deployed"

    - name: Check secret registration server service is running
      ansible.builtin.command:
        cmd: systemctl is-active secret_registration_server.service
      register: server_service_status
      changed_when: false

    - name: Assert secret registration server service is active
      ansible.builtin.assert:
        that: server_service_status.stdout == 'active'
        fail_msg: "Secret registration server service is not running"
